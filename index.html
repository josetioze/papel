QUE SEJAMOS FELIZES MEU CUSCUZ

<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nosso Amor ❤️</title>

<style>

body{
background:#d8c3a5;
font-family:Arial;
text-align:center;
margin:0;
overflow-x:hidden;
color:#4b2e2e;
}

/* CARTA */

#carta{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.botao{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#8b5e3c;
color:white;
cursor:pointer;
}

.botao:hover{
background:#6f472b;
}

/* SITE */

#site{
display:none;
padding-top:40px;
}

#titulo{
font-size:35px;
margin-bottom:20px;
}

#tempo{
font-size:25px;
margin-bottom:30px;
}

/* CORAÇÕES */

.heart{
position:fixed;
top:-10px;
font-size:20px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>
</head>

<body>


<!-- CARTA -->

<div id="carta">

<h1>Tenho algo para você ❤️</h1>

<button class="botao" onclick="abrirCarta()">
Abrir
</button>

</div>



<!-- SITE -->

<div id="site">

<h1 id="titulo"></h1>

<p id="tempo"></p>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

</div>



<script>

/* DATA INICIO */

const dataInicio = new Date(2026,1,9);



/* ABRIR CARTA */

function abrirCarta(){

document.getElementById("carta").style.display="none";

document.getElementById("site").style.display="block";

let musica=document.getElementById("musica");

musica.play();

}



/* CONTADOR */

function atualizarContador(){

const agora=new Date();

const diff=agora-dataInicio;

const dias=Math.floor(diff/(1000*60*60*24));

const horas=Math.floor((diff/(1000*60*60))%24);

const minutos=Math.floor((diff/(1000*60))%60);

const segundos=Math.floor((diff/1000)%60);

document.getElementById("tempo").innerHTML=

dias+" dias "+

horas+"h "+

minutos+"m "+

segundos+"s";

}

setInterval(atualizarContador,1000);



/* TITULO CORRIGIDO */

function atualizarTitulo(){

const agora=new Date();

let meses = 
(agora.getFullYear()-dataInicio.getFullYear())*12 +
(agora.getMonth()-dataInicio.getMonth());

if(agora.getDate() < 9){
meses--;
}

/* começa em 1 mês */
let mesesExibidos = meses + 1;

document.getElementById("titulo").innerText =
"Feliz Seja Nosso " + mesesExibidos + " Mês Amor ❤️";

}

atualizarTitulo();

setInterval(atualizarTitulo,3600000);



/* CORAÇÕES */

function criarCoracao(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},5000);

}

setInterval(criarCoracao,300);


</script>

</body>
</html>
