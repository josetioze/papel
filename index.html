<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nosso Universo ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
overflow-x:hidden;
}

/* CARTA */

#carta{
position:fixed;
width:100%;
height:100vh;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
}

#carta button{
font-size:22px;
padding:20px 40px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* MENU */

#menu{
display:none;
background:#111827;
padding:20px;
}

#menu button{
margin:10px;
padding:15px 25px;
border:none;
border-radius:15px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

/* PAGINAS */

.pagina{
display:none;
padding:30px;
max-width:900px;
margin:auto;
}

/* PAGINA HISTORIA */

#historia{
background:#d8c3a5;
min-height:100vh;
}

/* PAGINA CROCHE */

#croche{
background:linear-gradient(135deg,#2e7d32,#4caf50,#a5d6a7);
min-height:100vh;
position:relative;
overflow:hidden;
}

/* TEXTO */

.texto{
font-size:1.2em;
margin:30px;
line-height:1.6em;
}

/* SLIDES */

.slide{
display:none;
}

.slide img,
.slide video{
width:100%;
max-width:600px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* CORAÇÕES */

.heart{
position:fixed;
top:-10px;
color:red;
font-size:20px;
animation:fall linear infinite;
z-index:2;
}

@keyframes fall{
to{transform:translateY(100vh);}
}

/* ESTRELAS */

.star{
position:fixed;
color:white;
font-size:10px;
animation:twinkle 2s infinite alternate;
z-index:1;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* FIOS CROCHE */

#fio1,#fio2{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

.fio{
stroke:#f5deb3;
stroke-width:4;
fill:none;
stroke-dasharray:2000;
stroke-dashoffset:2000;
}

.fio1{animation:costurar1 18s linear infinite;}
.fio2{animation:costurar2 20s linear infinite;}

@keyframes costurar1{
to{stroke-dashoffset:0;}
}

@keyframes costurar2{
to{stroke-dashoffset:0;}
}

/* BRILHOS */

.brilho{
position:fixed;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:0.8;
animation:brilhar linear infinite;
pointer-events:none;
}

@keyframes brilhar{

0%{
transform:translateY(110vh);
opacity:0;
}

50%{
opacity:1;
}

100%{
transform:translateY(-10vh);
opacity:0;
}

}

</style>
</head>

<body>

<div id="carta">

<h2>💌 Tenho algo para você...</h2>

<button onclick="abrirSite()">Abrir ❤️</button>

</div>

<div id="menu">

<button onclick="abrirPagina('historia')">1 - Veja nossa história</button>
<button onclick="abrirPagina('croche')">2 - Tenho algo para você</button>
<button onclick="abrirPagina('sonho')">3 - Vamos sonhar</button>

</div>

<!-- HISTORIA -->

<div class="pagina" id="historia">

<h1>Nossa História ❤️</h1>

<div class="texto">

QUE SEJAMOS FELIZES MEU CUSCUZ

</div>

</div>

<!-- CROCHE -->

<div class="pagina" id="croche">

<!-- FIOS -->

<svg id="fio1">
<path class="fio fio1" d="M0 200 Q200 50 400 200 T800 200 T1200 300 T1600 200"/>
</svg>

<svg id="fio2">
<path class="fio fio2" d="M1600 400 Q1400 250 1200 400 T800 400 T400 500 T0 400"/>
</svg>

<h1>O Encanto do Crochê</h1>

<div class="texto">

Falam que o artesanato é a linguagem do coração, agora, vendo o que você cria, eu acredito nisso...

</div>

<div class="slide crocheSlide">
<img src="c1.jpeg">
</div>

<div class="slide crocheSlide">
<video autoplay muted playsinline>
<source src="v1.mp4">
</video>
</div>

<div class="slide crocheSlide">
<img src="c2.jpeg">
</div>

</div>

<div class="pagina" id="sonho">
<h1>Vamos Sonhar ✨</h1>
</div>

<audio id="musica" loop>
<source src="musica.mp3">
</audio>

<audio id="musica2" loop>
<source src="musica2.mpeg">
</audio>

<script>

/* ABRIR SITE */

function abrirSite(){
document.getElementById("carta").style.display="none";
document.getElementById("menu").style.display="block";
}

/* ABRIR PAGINA */

function abrirPagina(id){

let paginas=document.getElementsByClassName("pagina");

for(let i=0;i<paginas.length;i++){
paginas[i].style.display="none";
}

document.getElementById("menu").style.display="none";

let m1=document.getElementById("musica");
let m2=document.getElementById("musica2");

m1.pause();
m2.pause();

document.getElementById(id).style.display="block";

if(id==="historia"){m1.play();}
if(id==="croche"){m2.play();}

}

/* CORAÇÕES HISTORIA */

function criarCoracao(){

if(document.getElementById("historia").style.display !== "block") return;

const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},5000)

}

setInterval(criarCoracao,300);

/* ESTRELAS */

for(let i=0;i<80;i++){

let star=document.createElement("div");
star.classList.add("star");

star.innerHTML="✦";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

document.body.appendChild(star);

}

/* BRILHOS CROCHE */

for(let i=0;i<60;i++){

let brilho=document.createElement("div");

brilho.className="brilho";

brilho.style.left=Math.random()*100+"vw";
brilho.style.animationDuration=(Math.random()*10+5)+"s";

document.body.appendChild(brilho);

}

/* SLIDES CROCHE */

let slideIndex=0;

function mostrarSlides(){

let slides=document.getElementsByClassName("crocheSlide");

for(let i=0;i<slides.length;i++){
slides[i].style.display="none";
}

slideIndex++;

if(slideIndex>slides.length){
slideIndex=1;
}

let slideAtual=slides[slideIndex-1];

slideAtual.style.display="block";

setTimeout(mostrarSlides,8000);

}

mostrarSlides();

</script>

</body>
</html>
