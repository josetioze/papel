<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Universo ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
overflow-x:hidden;
}

/* CARTA */
#carta{
position:fixed;
width:100%;
height:100vh;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
}

#carta button{
font-size:22px;
padding:20px 40px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* MENU */
#menu{
display:none;
background:#111827;
padding:20px;
}

#menu button{
margin:10px;
padding:15px 25px;
border:none;
border-radius:15px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

/* PAGINAS */
.pagina{
display:none;
padding:30px;
}

/* HISTORIA */
#historia{
background:#d8c3a5;
min-height:100vh;
}

/* ESCOLHA */
#escolhaMes button{
margin:10px;
padding:15px 25px;
border:none;
border-radius:15px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* SLIDES */
.slide{
display:none;
}

.slide img{
width:100%;
max-width:500px;
border-radius:15px;
}

/* CROCHE */
#croche{
background:#2e7d32;
min-height:100vh;
}

/* SONHO */
#sonho{
background:#0f172a;
min-height:100vh;
}

/* EMAIL */
.email{
position:fixed;
bottom:10px;
right:10px;
font-size:11px;
opacity:0.6;
}

</style>
</head>

<body>

<!-- CARTA -->
<div id="carta">
<h2>💌 Tenho algo para você...</h2>
<button onclick="abrirSite()">Abrir ❤️</button>
</div>

<!-- MENU -->
<div id="menu">
<button onclick="abrirPagina('historia')">1 - Nossa História</button>
<button onclick="abrirPagina('croche')">2 - Crochê</button>
<button onclick="abrirPagina('sonho')">3 - Sonho</button>
</div>

<!-- HISTORIA -->
<div class="pagina" id="historia">

<h1>Nosso Amor ❤️</h1>

<!-- ESCOLHA -->
<div id="escolhaMes">
<h2>Escolha um momento ❤️</h2>

<button onclick="abrirHistoriaMes('mes1')">
💕 Primeiro Mês
</button>

<button onclick="abrirHistoriaMes('mesAtual')">
🌟 Mês Atual
</button>
</div>

<!-- PRIMEIRO MES -->
<div id="mes1" style="display:none;">

<div class="slide mes1Slide">
<img src="w1.jpeg">
<p>Nossa primeira foto</p>
</div>

<div class="slide mes1Slide">
<img src="w2.jpeg">
<p>Memória especial</p>
</div>

<div class="slide mes1Slide">
<img src="w3.jpeg">
<p>Momentos únicos</p>
</div>

</div>

<!-- MES ATUAL -->
<div id="mesAtual" style="display:none;">

<div class="slide mesAtualSlide">
<img src="t1.jpeg">
<p>Nosso segundo mês ❤️</p>
</div>

<div class="slide mesAtualSlide">
<img src="t2.jpeg">
<p>Mais memórias</p>
</div>

<div class="slide mesAtualSlide">
<img src="t3.jpeg">
<p>Amor crescendo</p>
</div>

</div>

</div>

<!-- CROCHE -->
<div class="pagina" id="croche">
<h1>Seu talento ❤️</h1>
<p>Você é incrível no que faz.</p>
</div>

<!-- SONHO -->
<div class="pagina" id="sonho">
<h1>Nosso futuro ✨</h1>
<p>Vamos viver tudo isso juntos.</p>
</div>

<!-- MÚSICAS -->
<audio id="musica"><source src="musica.mp3"></audio>
<audio id="musicaMesAtual"><source src="musica01.mp3"></audio>

<div class="email">
contato: tioze.jmps@gmail.com
</div>

<script>

/* ABRIR SITE */
function abrirSite(){
document.getElementById("carta").style.display="none";
document.getElementById("menu").style.display="block";
}

/* ABRIR PAGINA */
function abrirPagina(id){

let paginas=document.getElementsByClassName("pagina");

for(let i=0;i<paginas.length;i++)
paginas[i].style.display="none";

document.getElementById("menu").style.display="none";
document.getElementById(id).style.display="block";

}

/* ESCOLHER MES */
function abrirHistoriaMes(mes){

document.getElementById("escolhaMes").style.display="none";

document.getElementById("mes1").style.display="none";
document.getElementById("mesAtual").style.display="none";

document.getElementById(mes).style.display="block";

/* músicas */
let m1=document.getElementById("musica");
let m2=document.getElementById("musicaMesAtual");

[m1,m2].forEach(m=>{
m.pause();
m.currentTime=0;
});

if(mes==="mes1") m1.play();
if(mes==="mesAtual") m2.play();

}

/* SLIDE MES 1 */
let slide1=0;

function slideMes1(){

let slides=document.getElementsByClassName("mes1Slide");

for(let i=0;i<slides.length;i++)
slides[i].style.display="none";

slide1++;

if(slide1>slides.length) slide1=1;

slides[slide1-1].style.display="block";

setTimeout(slideMes1,4000);
}

slideMes1();

/* SLIDE MES ATUAL */
let slide2=0;

function slideMesAtual(){

let slides=document.getElementsByClassName("mesAtualSlide");

for(let i=0;i<slides.length;i++)
slides[i].style.display="none";

slide2++;

if(slide2>slides.length) slide2=1;

slides[slide2-1].style.display="block";

setTimeout(slideMesAtual,4000);
}

slideMesAtual();

</script>

</body>
</html>
